<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>データ発行 | あんしん決済 Smart版</title>
<link rel="stylesheet" href="../assets/common.css">
</head>
<body>
<div class="mock-backbar">
  <a href="../index.html">← 画面一覧へ戻る</a>
  <span class="sid">payment-mgmt-data</span><span class="nm">データ発行</span>
</div>
<div class="screen active" id="screen-payment-mgmt-data">
  <div class="step-desc-bar">
    <span class="step-desc-num">データ</span>
    <span class="step-desc-title">データ発行 — 経理用データ（売上／預り金／仕訳）の発行</span>
    <span style="background:#c0392b;color:white;font-size:10px;font-weight:700;padding:2px 10px;border-radius:2px;margin-left:12px;">❤️ あんしん決済管理画面（MOTA）</span>
  </div>

  <div class="app-header mota">
    <div style="display:flex;align-items:center;gap:24px;height:100%;">
      <span class="logo" onclick="showScreen('prop-list-new',null)">MöTA <span style="font-size:13px;font-weight:400;color:#bbb;">あんしん決済 管理画面</span></span>
    </div>
    <div class="menu">
      <div class="menu-item" onclick="showScreen('prop-list-new',null)">成約</div>
      <div class="menu-item">オペレータ</div>
      <div class="menu-item active" onclick="showScreen('payment-mgmt',null)">入金/送金</div>
    </div>
    <div class="right-tools">
      <button class="hamburger-btn" onclick="alert('メニュー（実装予定）')" title="メニュー"><span></span><span></span><span></span></button>
      <button class="logout-btn">ログアウト</button>
    </div>
  </div>

  <div style="background:#f0f0ee;padding:18px 28px;min-height:100vh;">
    <div style="font-size:20px;font-weight:700;margin-bottom:14px;">データ発行</div>

    <!-- タブ：入金履歴／送金履歴（→ payment-mgmt へ遷移）／データ発行（現在地） -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button onclick="jumpToPaymentMgmt('nyukin')" style="background:white;color:#1a1a1a;border:1px solid #ccc;border-radius:4px;padding:9px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">入金履歴</button>
      <button onclick="jumpToPaymentMgmt('sokin')" style="background:white;color:#1a1a1a;border:1px solid #ccc;border-radius:4px;padding:9px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">送金履歴</button>
      <div style="width:1px;height:28px;background:#bbb;margin:0 6px;"></div>
      <button style="background:#1E56A0;color:white;border:1.5px solid #1E56A0;border-radius:4px;padding:9px 18px;font-size:13px;font-weight:700;cursor:default;font-family:inherit;display:flex;align-items:center;gap:6px;">📤 データ発行</button>
      <span style="font-size:10px;color:#888;">※別画面として独立</span>
    </div>

    <div style="background:#e3f2fd;border-left:4px solid #1E56A0;padding:12px 18px;margin-bottom:18px;font-size:12px;color:#0d47a1;line-height:1.7;">
      <strong>📤 データ発行</strong><br>
      経理用データの発行はこのページで一元管理します。
    </div>

    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:20px 24px;margin-bottom:18px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">■ 前月分預り金データ</div>
      <div style="font-size:11px;color:#888;margin-bottom:14px;line-height:1.7;">※前月分を自動抽出して発行します。発行対象月の指定は不要です。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button onclick="alert('前月分の売上データを発行しました（CSV形式でダウンロード）')" style="background:#1a1a1a;color:white;border:none;border-radius:4px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">📄 売上発行</button>
        <button onclick="alert('前月分の預り金データを発行しました（CSV形式でダウンロード）')" style="background:#1a1a1a;color:white;border:none;border-radius:4px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">📄 預り金発行</button>
      </div>
    </div>

    <div style="background:white;border:1px solid #e0e0e0;border-radius:6px;padding:20px 24px;margin-bottom:18px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">■ 仕訳データ</div>
      <div style="font-size:11px;color:#888;margin-bottom:14px;line-height:1.7;">期間を指定して仕訳データを発行します。</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
        <label style="font-size:12px;color:#555;font-weight:700;">期間指定：</label>
        <input type="date" value="2026-05-01" style="border:1px solid #ccc;border-radius:3px;padding:7px 10px;font-size:12px;font-family:inherit;">
        <span style="font-size:12px;color:#555;">〜</span>
        <input type="date" value="2026-05-31" style="border:1px solid #ccc;border-radius:3px;padding:7px 10px;font-size:12px;font-family:inherit;">
      </div>
      <button onclick="alert('指定期間の仕訳データを発行しました（CSV形式でダウンロード）')" style="background:#1a1a1a;color:white;border:none;border-radius:4px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">📄 発行</button>
    </div>

  </div>

  <div class="app-footer">
    <div class="links"><span>会社概要</span><span>利用規約</span></div>
    <div class="copyright">© MOTA, Inc. ─ あんしん決済 Smart版</div>
  </div>
</div><!-- /screen-payment-mgmt-data -->

<script>
// 入金/送金履歴タブクリック時：payment-mgmt.htmlへ遷移し、初期タブをsessionStorageで指定
function jumpToPaymentMgmt(tab) {
  try { sessionStorage.setItem('pm-tab', tab); } catch(e) {}
  showScreen('payment-mgmt', null);
}
</script>

<script src="../assets/common.js"></script>
</body>
</html>
